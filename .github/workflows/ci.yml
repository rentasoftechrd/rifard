name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install backend deps
        run: cd apps/backend && npm ci

      - name: Lint backend
        run: cd apps/backend && npm run lint 2>/dev/null || true

      - name: Build backend
        run: cd apps/backend && npm run build
        env:
          DATABASE_URL: postgresql://u:p@localhost:5432/db

  backoffice-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Install backoffice deps
        run: cd apps/backoffice && flutter pub get

      - name: Build backoffice web
        run: cd apps/backoffice && flutter build web --no-wasm-dry-run

  pos-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Install POS deps
        run: cd apps/pos && flutter pub get

      - name: Build POS APK
        run: cd apps/pos && flutter build apk --debug
